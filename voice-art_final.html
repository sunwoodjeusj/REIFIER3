.mw{width:2px;height:80px;background:rgba(255,255,255,.05);position:relative;}.mb{position:absolute;bottom:0;left:0;width:100%;transition:height .04s;}.ml{color:rgba(255,255,255,.16);font-size:9px;letter-spacing:.04em;text-align:center;margin-top:3px;font-weight:300;}

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ════════════════════════════════════════════════════════
// GLOBALS
// ════════════════════════════════════════════════════════
const W=innerWidth,H=innerHeight;
let currentTab='particle',globalFrame=0;
const tipEl=document.getElementById('tooltip');
const mouseNDC=new THREE.Vector2(-9,0);
let mouseScreenX=-9999,mouseScreenY=-9999;

const WORDS=['낙하','소리','흐름','파동','울림','빛','궤적','입자','선','층',
  'fall','wave','flow','sound','light','echo','pulse','path','void','drift',
  '落下','波動','流れ','音','光','響き','震え','道','間','気',
  '轨迹','波动','流动','声音','光','回响','颤动','路','间','气',
  'chute','onde','flux','son','lumière','écho','pouls','chemin','vide','dérive',
  'звук','волна','свет','дыхание','эхо','пульс','поток','пустота','след','путь'];

// ════════════════════════════════════════════════════════
// AUDIO — high sensitivity phoneme detection
// ════════════════════════════════════════════════════════
let audioCtx,analyser,freqData,timeData,micOn=false;
let vol=0,pitch=0,bright=0,onset=0;
let sVol=0,sPitch=0,sBright=0,sOnset=0,sFlux=0;
let eLow=0,eMid=0,eHigh=0,eVH=0;
let seLow=0,seMid=0,seHigh=0,seVH=0;
let phonemeClass=0,prevPhoneme=-1,prevEnergy=0,prevBins=null;
// Per-frame raw energy used for instant reactivity
let rawOnset=0,rawFlux=0;

async function startMic(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:true,echoCancellation:false,noiseSuppression:false,autoGainControl:false});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const src=audioCtx.createMediaStreamSource(s);
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=2048; // smaller = faster response
    analyser.smoothingTimeConstant=0.5; // less smoothing = more reactive
    src.connect(analyser);
    freqData=new Uint8Array(analyser.frequencyBinCount);
    timeData=new Uint8Array(analyser.fftSize);
    prevBins=new Float32Array(analyser.frequencyBinCount);
    micOn=true;
    document.getElementById('mic-ind').classList.add('on');
    document.getElementById('mic-label').textContent='MIC ON';
    document.getElementById('btn-mic').classList.add('on');
    document.getElementById('btn-mic').textContent='MIC OFF';
  }catch(e){alert('마이크 접근 권한이 필요합니다.');}
}
function stopMic(){if(audioCtx)audioCtx.close();micOn=false;vol=sVol=0;document.getElementById('mic-ind').classList.remove('on');document.getElementById('mic-label').textContent='MIC OFF';document.getElementById('btn-mic').classList.remove('on');document.getElementById('btn-mic').textContent='MIC ON';}

function analyzeAudio(){
  if(!micOn||!analyser)return;
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);
  const N=freqData.length,sr=audioCtx.sampleRate;
  let rms=0;for(let i=0;i<timeData.length;i++){const v=(timeData[i]-128)/128;rms+=v*v;}
  vol=Math.sqrt(rms/timeData.length);

  const b1=Math.floor(200*N/(sr/2)),b2=Math.floor(800*N/(sr/2)),b3=Math.floor(2000*N/(sr/2)),b4=Math.floor(4000*N/(sr/2));
  eLow=0;eMid=0;eHigh=0;eVH=0;
  for(let i=0;i<b1;i++)eLow+=freqData[i];
  for(let i=b1;i<b2;i++)eMid+=freqData[i];
  for(let i=b2;i<b3;i++)eHigh+=freqData[i];
  for(let i=b3;i<b4;i++)eVH+=freqData[i];
  eLow/=(b1||1)*255;eMid/=((b2-b1)||1)*255;eHigh/=((b3-b2)||1)*255;eVH/=((b4-b3)||1)*255;
  let ws=0,sm=0;for(let i=0;i<N;i++){ws+=freqData[i]*i;sm+=freqData[i];}
  bright=sm>0?ws/sm/N:0;
  let mx=0,mi=0,lo=Math.floor(80*N/(sr/2)),hi=Math.floor(1500*N/(sr/2));
  for(let i=lo;i<hi;i++)if(freqData[i]>mx){mx=freqData[i];mi=i;}
  pitch=mi*(sr/2)/N;

  // Onset — very sensitive, raw
  rawOnset=Math.max(0,(vol-prevEnergy)*30);
  prevEnergy=vol*0.5+prevEnergy*0.5;
  onset=rawOnset;

  // Spectral flux
  if(prevBins){let fx=0;for(let i=0;i<N;i++){const d=freqData[i]/255-prevBins[i];if(d>0)fx+=d*3;}rawFlux=fx/N;for(let i=0;i<N;i++)prevBins[i]=freqData[i]/255;}

  // Smooth (fast alpha)
  const a=0.2;
  sVol+=(vol-sVol)*a;sPitch+=(pitch-sPitch)*a;sBright+=(bright-sBright)*0.15;
  seLow+=(eLow-seLow)*a;seMid+=(eMid-seMid)*a;seHigh+=(eHigh-seHigh)*a;seVH+=(eVH-seVH)*a;
  sOnset+=(rawOnset-sOnset)*0.3;
  sFlux+=(rawFlux-sFlux)*0.25;

  // Phoneme — fires eagerly
  if(vol<0.008)phonemeClass=0;
  else if(rawOnset>0.08)phonemeClass=4;
  else if(eHigh>0.3&&eVH>0.12)phonemeClass=6;
  else if(eMid>0.28&&eLow<0.18)phonemeClass=5;
  else if(eLow>0.25&&eMid>0.2)phonemeClass=1;
  else if(eHigh>0.2&&eMid<0.12)phonemeClass=2;
  else if(eLow>0.3&&eHigh<0.08)phonemeClass=3;
  else phonemeClass=1;

  const pl=['—','아/오','이/에','우','attack','나/마','사'];
  document.getElementById('s-vol').textContent='VOL ——— '+vol.toFixed(3);
  document.getElementById('s-pitch').textContent='PITCH — '+Math.round(pitch)+' Hz';
  document.getElementById('s-phoneme').textContent='PHONEME — '+(pl[phonemeClass]||'?');
  document.getElementById('vol-bar').style.height=Math.min(100,vol*600)+'%';
  document.getElementById('pitch-bar').style.height=Math.min(100,Math.min(pitch/800,1)*100)+'%';
  document.getElementById('bright-bar').style.height=Math.min(100,bright*400)+'%';
  document.getElementById('onset-bar').style.height=Math.min(100,sOnset*400)+'%';
}

// ════════════════════════════════════════════════════════
// SHARED ORBIT
// ════════════════════════════════════════════════════════
function makeOrbit(initR){
  let sph={theta:.4,phi:1.25,r:initR};
  let drag=false,shift=false,px=0,py=0;
  const dAcc={x:0,y:0,z:0},dF={x:0,y:0,z:0};
  const MAXV=8000,dv=new Float32Array(MAXV*3);
  let cam=null;
  function apply(){sph.phi=Math.max(.05,Math.min(Math.PI-.05,sph.phi));cam.position.set(sph.r*Math.sin(sph.phi)*Math.sin(sph.theta),sph.r*Math.cos(sph.phi),sph.r*Math.sin(sph.phi)*Math.cos(sph.theta));cam.lookAt(0,0,0);}
  function bindEvents(el){
    el.addEventListener('mousedown',e=>{drag=true;px=e.clientX;py=e.clientY;shift=e.shiftKey;});
    window.addEventListener('mouseup',()=>drag=false);
    window.addEventListener('keydown',e=>{if(e.key==='Shift')shift=true;});
    window.addEventListener('keyup',e=>{if(e.key==='Shift')shift=false;});
    window.addEventListener('mousemove',e=>{
      mouseNDC.x=(e.clientX/W)*2-1;mouseNDC.y=-(e.clientY/H)*2+1;
      mouseScreenX=e.clientX;mouseScreenY=e.clientY;
      tipEl.style.left=(e.clientX+16)+'px';tipEl.style.top=(e.clientY-8)+'px';
      if(!drag)return;
      const dx=e.clientX-px,dy=e.clientY-py;
      if(shift){const r=new THREE.Vector3(),u=new THREE.Vector3();r.setFromMatrixColumn(cam.matrixWorld,0);u.setFromMatrixColumn(cam.matrixWorld,1);dAcc.x+=(r.x*dx+u.x*dy)*.15;dAcc.y+=(r.y*dx+u.y*dy)*.15;dAcc.z+=(r.z*dx+u.z*dy)*.15;}
      else{sph.theta-=dx*.006;sph.phi+=dy*.006;apply();}
      px=e.clientX;py=e.clientY;
    });
    el.addEventListener('wheel',e=>{sph.r=Math.max(80,Math.min(1400,sph.r+e.deltaY*.35));apply();},{passive:true});
    let tx=0,ty=0;
    el.addEventListener('touchstart',e=>{drag=true;tx=e.touches[0].clientX;ty=e.touches[0].clientY;shift=e.touches.length>1;});
    el.addEventListener('touchend',()=>drag=false);
    el.addEventListener('touchmove',e=>{if(!drag)return;const ddx=e.touches[0].clientX-tx,ddy=e.touches[0].clientY-ty;if(e.touches.length>1){dAcc.x+=ddx*.1;dAcc.y+=ddy*.1;}else{sph.theta-=ddx*.007;sph.phi+=ddy*.007;apply();}tx=e.touches[0].clientX;ty=e.touches[0].clientY;});
  }
  function upDeform(){const dc=.96,in2=.18;dF.x+=(dAcc.x-dF.x)*in2;dF.y+=(dAcc.y-dF.y)*in2;dF.z+=(dAcc.z-dF.z)*in2;dAcc.x=0;dAcc.y=0;dAcc.z=0;for(let i=0;i<MAXV;i++){const sp=Math.sin(i*.07+globalFrame*.01)*.7+.3;dv[i*3]=dv[i*3]*dc+dF.x*sp;dv[i*3+1]=dv[i*3+1]*dc+dF.y*sp;dv[i*3+2]=dv[i*3+2]*dc+dF.z*sp;}}
  function resetD(){dv.fill(0);dF.x=dF.y=dF.z=0;}
  function applyD(pts,str=1){return pts.map((p,i)=>new THREE.Vector3(p.x+dv[(i%MAXV)*3]*str,p.y+dv[(i%MAXV)*3+1]*str,p.z+dv[(i%MAXV)*3+2]*str));}
  function autoRot(sp){if(!drag){sph.theta+=sp;apply();}}
  return{sph,apply,bindEvents,upDeform,resetD,applyD,autoRot,setCamera:c=>{cam=c;apply();},isDragging:()=>drag};
}

// ════════════════════════════════════════════════════════
// ██  PARTICLE — shape changes every sound input
// ════════════════════════════════════════════════════════
const pLayer=document.getElementById('layer-particle');
const pRen=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
pRen.setSize(W,H);pRen.setPixelRatio(Math.min(devicePixelRatio,2));pRen.setClearColor(0,1);
pLayer.appendChild(pRen.domElement);
const pScene=new THREE.Scene(),pCam=new THREE.PerspectiveCamera(55,W/H,.1,3000);
const pOrb=makeOrbit(300);pOrb.setCamera(pCam);pOrb.bindEvents(pRen.domElement);

const PMAX=4000,PBASE=900;
const pPos=new Float32Array(PMAX*3),pOri=new Float32Array(PMAX*3);
const pVel=new Float32Array(PMAX*3),pSz=new Float32Array(PMAX),pPh=new Float32Array(PMAX);
for(let i=0;i<PMAX;i++){pPh[i]=Math.random()*Math.PI*2;pSz[i]=.6+Math.random()*2.4;pVel[i*3]=(Math.random()-.5)*.025;pVel[i*3+1]=(Math.random()-.5)*.025;pVel[i*3+2]=(Math.random()-.5)*.025;}

function rSph(r){const u=Math.random(),v=Math.random(),th=2*Math.PI*u,ph=Math.acos(2*v-1);return[r*Math.sin(ph)*Math.cos(th),r*Math.sin(ph)*Math.sin(th),r*Math.cos(ph)];}

// Each generator randomizes parameters each call — always fresh
const pGens={
  sphere:()=>{const r=50+Math.random()*70;for(let i=0;i<PMAX;i++){const p=rSph(r*(0.6+Math.random()*.8));pOri[i*3]=p[0];pOri[i*3+1]=p[1];pOri[i*3+2]=p[2];}},
  torus:()=>{const R=60+Math.random()*60,r=15+Math.random()*35;for(let i=0;i<PMAX;i++){const u=Math.random()*Math.PI*2,v=Math.random()*Math.PI*2;pOri[i*3]=(R+r*Math.cos(v))*Math.cos(u)+(Math.random()-.5)*10;pOri[i*3+1]=(R+r*Math.cos(v))*Math.sin(u)+(Math.random()-.5)*10;pOri[i*3+2]=r*Math.sin(v)+(Math.random()-.5)*10;}},
  spiral:()=>{const turns=4+Math.random()*8,rx=40+Math.random()*50;for(let i=0;i<PMAX;i++){const t=(i/PMAX)*Math.PI*2*turns,r=t*(rx/turns/Math.PI),y=(i/PMAX)*200-100;pOri[i*3]=r*Math.cos(t)+(Math.random()-.5)*12;pOri[i*3+1]=y+(Math.random()-.5)*6;pOri[i*3+2]=r*Math.sin(t)+(Math.random()-.5)*12;}},
  burst:()=>{for(let i=0;i<PMAX;i++){const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=10+Math.pow(Math.random(),.3)*(140+Math.random()*60);pOri[i*3]=r*Math.sin(ph)*Math.cos(th);pOri[i*3+1]=r*Math.sin(ph)*Math.sin(th);pOri[i*3+2]=r*Math.cos(ph);}},
  helix:()=>{const strands=2+Math.floor(Math.random()*4),r=40+Math.random()*40;for(let i=0;i<PMAX;i++){const s=i%strands,t=(i/PMAX)*Math.PI*(10+Math.random()*8),o=(s/strands)*Math.PI*2;pOri[i*3]=r*Math.cos(t+o)+(Math.random()-.5)*8;pOri[i*3+1]=(i/PMAX)*200-100+(Math.random()-.5)*5;pOri[i*3+2]=r*Math.sin(t+o)+(Math.random()-.5)*8;}},
  ring:()=>{const layers=3+Math.floor(Math.random()*5);for(let i=0;i<PMAX;i++){const a=Math.random()*Math.PI*2,l=Math.floor(Math.random()*layers),R=30+l*(20+Math.random()*15);pOri[i*3]=R*Math.cos(a)+(Math.random()-.5)*14;pOri[i*3+1]=(Math.random()-.5)*(20+Math.random()*30);pOri[i*3+2]=R*Math.sin(a)+(Math.random()-.5)*14;}},

function tGenLissajous(ev,pn,sb){
  const a=2+Math.floor(Math.random()*4),b=1+Math.floor(Math.random()*5),N=400;

    const d2=delta+l*(0.03+Math.random()*.1);

// ── Sample any shape into MORPH_LINES×MORPH_PTS grid ──────
function tSampleShape(shapeName,ev,pn,sb){
  const gen=tGenMap[shapeName]||tGenLissajous;
  const rawCurves=gen(ev,pn,sb);
  const result=[];
  const opacs=[];
  for(let li=0;li<MORPH_LINES;li++){
    // Pick a curve from rawCurves (cycle/random)
    const src=rawCurves[li%rawCurves.length];
    const pts=[];
    for(let pi=0;pi<MORPH_PTS;pi++){
      const t=pi/(MORPH_PTS-1);
      const fi=t*(src.length-1);
      const ia=Math.floor(fi),ib=Math.min(ia+1,src.length-1);
      const frac=fi-ia;
      pts.push({
        x:src[ia].x+(src[ib].x-src[ia].x)*frac,
        y:src[ia].y+(src[ib].y-src[ia].y)*frac,
        z:src[ia].z+(src[ib].z-src[ia].z)*frac,
      });
    }
    result.push(pts);
    opacs.push(0.06+Math.random()*0.18+ev*0.15);
  }
  return{pts:result,opacs};
}

// ── Upload current interpolated positions to GPU ──────────
function tUploadMorph(){
  tAllPts=[];let di=0;
  for(let li=0;li<MORPH_LINES;li++){
    const cur=tCurPts[li],buf=tMorphPool[li].buf;
    for(let pi=0;pi<MORPH_PTS;pi++){buf[pi*3]=cur[pi].x;buf[pi*3+1]=cur[pi].y;buf[pi*3+2]=cur[pi].z;}
    tMorphPool[li].geo.attributes.position.needsUpdate=true;
    tMorphPool[li].line.material.opacity=tOpacity[li];
    tMorphPool[li].line.visible=tShowLines;
    if(li%4===0) tAllPts.push(new THREE.Vector3(cur[0].x,cur[0].y,cur[0].z),new THREE.Vector3(cur[Math.floor(MORPH_PTS/2)].x,cur[Math.floor(MORPH_PTS/2)].y,cur[Math.floor(MORPH_PTS/2)].z));
    // dots
    if(tShowDots&&di+1<TPOOL*2){tdPos[di*3]=cur[0].x;tdPos[di*3+1]=cur[0].y;tdPos[di*3+2]=cur[0].z;di++;tdPos[di*3]=cur[MORPH_PTS-1].x;tdPos[di*3+1]=cur[MORPH_PTS-1].y;tdPos[di*3+2]=cur[MORPH_PTS-1].z;di++;}
  }
  tdGeo.attributes.position.needsUpdate=true;tdGeo.setDrawRange(0,di);
  tDots.visible=tShowDots;
}

      // Each line starts morphing slightly after previous — wave-like cascade
      const lineDelay=(li/MORPH_LINES)*0.5;
      const lineT=Math.max(0,Math.min(1,(tMorphT-lineDelay)*1.5));
      // Smooth cubic ease
      const e2=lineT<0.5?4*lineT*lineT*lineT:(lineT-1)*(2*lineT-2)*(2*lineT-2)+1;
      for(let pi=0;pi<MORPH_PTS;pi++){
        tCurPts[li][pi].x+=(tTgtPts[li][pi].x-tCurPts[li][pi].x)*e2*0.12;
        tCurPts[li][pi].y+=(tTgtPts[li][pi].y-tCurPts[li][pi].y)*e2*0.12;
        tCurPts[li][pi].z+=(tTgtPts[li][pi].z-tCurPts[li][pi].z)*e2*0.12;

}

const NWLINES=100, NWPTS=300;
const wLineBufs=[], wLineMat=[];
for(let li=0;li<NWLINES;li++){
  const g=new THREE.BufferGeometry();

const WGLINTS=800;
const wGlintGeo=new THREE.BufferGeometry();

wGlintGeo.setAttribute('position',new THREE.BufferAttribute(wGlintPos,3));
const wGlintMat=new THREE.ShaderMaterial({

  vertexShader:`uniform float uVol,uOnset;void main(){gl_PointSize=0.7+uVol*2.5+uOnset*4.;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`void main(){vec2 u=gl_PointCoord-.5;if(length(u)>.5)discard;gl_FragColor=vec4(1.,1.,1.,.85);}`,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
});
wScene.add(new THREE.Points(wGlintGeo,wGlintMat));

const FFT_HIST=NWLINES, FFT_BINS=NWPTS;
const wFFTHistory=[];
for(let i=0;i<FFT_HIST;i++) wFFTHistory.push(new Float32Array(FFT_BINS));
let wHistHead=0;
let wSCurl=0, wSFlat=1, wPhase=0;
// Wave mode: 0=layered flat, 1=sphere, 2=cylinder, 3=ribbon chaos
let wMode=0, wSMode=0, wModeCooldown=0;

function wUpdate(){
  const ev=micOn?sVol:((Math.sin(globalFrame*.008)*.5+.5)*.04);
  const pn=micOn?Math.min(sPitch/800,1):0;
  const on=micOn?sOnset:0;
  const fl=micOn?sFlux:0;
  const sb=micOn?sBright:0;
  wPhase+=0.006+ev*.03+pn*.012;

  // Mode selection from phoneme + volume
  if(micOn&&vol>0.01&&wModeCooldown<=0){
    const newMode=phonemeClass===3?1:phonemeClass===1?2:phonemeClass===4?3:0;
    if(newMode!==wMode){wMode=newMode;wModeCooldown=40;}
  }
  wModeCooldown=Math.max(0,wModeCooldown-1);
  wSCurl+=(wMode===1?1:0-wSCurl)*0.05;

  // Write FFT row
  if(micOn&&analyser){
    analyser.getByteFrequencyData(freqData);
    const N=freqData.length;
    for(let bi=0;bi<FFT_BINS;bi++){
      const fi=Math.floor(bi/FFT_BINS*N);
      // Mix raw FFT with some spectral smearing for smoother lines
      const v=freqData[fi]/255;
      const vL=bi>0?freqData[Math.floor((bi-1)/FFT_BINS*N)]/255:v;
      const vR=bi<FFT_BINS-1?freqData[Math.floor((bi+1)/FFT_BINS*N)]/255:v;
      wFFTHistory[wHistHead][bi]=(v*.5+vL*.25+vR*.25);
    }
  } else {
    // Rich ambient demo
    for(let bi=0;bi<FFT_BINS;bi++){
      const t=bi/FFT_BINS;
      const s1=Math.sin(t*Math.PI*3+wPhase)*0.4;
      const s2=Math.sin(t*Math.PI*7+wPhase*1.3)*0.2;
      const s3=Math.sin(t*Math.PI*1.5+wPhase*0.6)*0.3;
      wFFTHistory[wHistHead][bi]=Math.max(0,(s1+s2+s3)*0.5+0.15)*(Math.sin(wPhase*.4+t*2)*.3+.7);
    }
  }
  wHistHead=(wHistHead+1)%FFT_HIST;

  const amp=80+ev*350+on*200+sb*100;  // much larger amplitude range
  const R=170;
  const wSpread=230+pn*80+sb*40;
  const wHeight=200+ev*80;

  for(let li=0;li<NWLINES;li++){
    const histIdx=(wHistHead+li)%FFT_HIST;
    const row=wFFTHistory[histIdx];
    const buf=wLineBufs[li];
    const yNorm=(li/NWLINES)*2-1;
    const baseY=yNorm*(wHeight/2);
    const lineAge=li/NWLINES; // 0=oldest,1=newest

    for(let pi=0;pi<NWPTS;pi++){
      const xNorm=(pi/NWPTS)*2-1;
      const fftVal=row[pi];
      // Multi-layer displacement: main wave + harmonics
      const mainWave=fftVal*amp;
      const harmonic2=Math.sin(pi/NWPTS*Math.PI*4+wPhase+li*.1)*(ev*60+sb*30);
      const harmonic3=Math.sin(pi/NWPTS*Math.PI*8+wPhase*1.5)*(fl*80+on*40);
      const harmonic4=Math.cos(pi/NWPTS*Math.PI*12+wPhase*2.3)*ev*30;
      const totalY=mainWave+harmonic2+harmonic3+harmonic4;
      // Cross-line interference (newer lines slightly influenced by older)
      const crossLi=Math.max(0,li-2);
      const crossVal=wFFTHistory[(wHistHead+crossLi)%FFT_HIST][pi];
      const interference=(crossVal-fftVal)*on*20;

      let px,py,pz;
      if(wMode===0){
        // Flat layered — images 1,2
        px=xNorm*wSpread;
        py=baseY+totalY+interference;
        pz=(lineAge-.5)*40*fl;
      } else if(wMode===1){
        // Sphere wrap — images 3,4
        const theta=(xNorm+1)*Math.PI;
        const phiBase=Math.PI/2-yNorm*Math.PI*.42;
        const r=R+totalY*.3+interference*.2;
        const sx=r*Math.sin(phiBase)*Math.cos(theta);
        const sy=r*Math.cos(phiBase);
        const sz=r*Math.sin(phiBase)*Math.sin(theta);
        const curl=wSCurl;
        px=xNorm*wSpread*(1-curl)+sx*curl;
        py=(baseY+totalY)*(1-curl)+sy*curl;
        pz=sz*curl;
      } else if(wMode===2){
        // Cylinder — vowel 아/오
        const theta2=(xNorm+1)*Math.PI;
        const rc=120+totalY*.4;
        px=rc*Math.cos(theta2);
        py=baseY+interference;
        pz=rc*Math.sin(theta2);
      } else {
        // Ribbon chaos — consonant attack
        const twist=wPhase*2+li*.3;
        px=xNorm*wSpread+Math.sin(xNorm*Math.PI*3+twist)*30*ev;
        py=baseY+totalY+Math.cos(xNorm*Math.PI*5+twist)*20*sb;
        pz=Math.sin(xNorm*Math.PI+wPhase+li*.2)*60*ev+interference;
      }
      buf[pi*3]=px; buf[pi*3+1]=py; buf[pi*3+2]=pz;
    }
    const avgE=row.reduce((a,b)=>a+b,0)/row.length;
    const ageFade=0.2+0.8*lineAge;
    wLineMat[li].opacity=Math.min(0.8,(0.03+avgE*.55+on*.35)*ageFade+(lineAge>.9?on*.4:0));
    wLineBufs[li]=buf;
  }
  for(let li=0;li<NWLINES;li++){const g=wScene.children[li];if(g&&g.geometry)g.geometry.attributes.position.needsUpdate=true;}
  // Glints at bright peaks
  for(let g=0;g<WGLINTS;g++){
    const li=Math.floor(Math.random()*NWLINES);
    const pi=Math.floor(Math.random()*NWPTS);
    const buf=wLineBufs[li];
    wGlintPos[g*3]=buf[pi*3];wGlintPos[g*3+1]=buf[pi*3+1];wGlintPos[g*3+2]=buf[pi*3+2];
  }
  wGlintGeo.attributes.position.needsUpdate=true;
  wGlintMat.uniforms.uVol.value=ev;wGlintMat.uniforms.uOnset.value=on;
  if(!wOrbDrag){wSph.theta+=0.0004+ev*.002;wApplyCam();}
  const modeNames=['FLAT','SPHERE','CYLINDER','CHAOS'];
  document.getElementById('s-pts').textContent='ROWS — '+NWLINES;
  document.getElementById('s-shape').textContent='WAVE — '+modeNames[wMode];
  wRen.render(wScene,wCam);
}

class ChStroke{
  constructor(pts,ox,oy,scale){
    // pts = array of {x,y} normalized
    this.pts=pts; this.ox=ox; this.oy=oy; this.scale=scale;
    this.t=0; this.speed=0.01+Math.random()*.012;
    this.alpha=0; this.cells=[];this.lastCellT=-1;
  }
  posAt(t){
    const pts=this.pts;
    if(!pts||pts.length<2)return{x:this.ox,y:this.oy};
    const fi=Math.max(0,Math.min(pts.length-1.001,t*(pts.length-1)));
    const ia=Math.floor(fi),ib=Math.min(ia+1,pts.length-1);
    const f=fi-ia;
    return{x:this.ox+(pts[ia].x+(pts[ib].x-pts[ia].x)*f)*this.scale,
           y:this.oy+(pts[ia].y+(pts[ib].y-pts[ia].y)*f)*this.scale};
  }
  draw(ctx,ev,on){
    this.speed=0.008+ev*.022+on*.018;
    this.alpha=Math.min(.85,this.alpha+.03);
    this.t=Math.min(1,this.t+this.speed);
    // spawn cell branches
    if(this.t-this.lastCellT>0.15&&Math.random()<.35){
      const p=this.posAt(this.t);
      this.cells.push({x:p.x,y:p.y,vx:(Math.random()-.5)*1.4,vy:(Math.random()-.5)*1.4,len:0,maxLen:6+Math.random()*18,a:.5});
      this.lastCellT=this.t;
    }
    // main path
    const steps=Math.max(2,Math.floor(this.t*(this.pts.length-1)*10)+1);
    ctx.beginPath();
    for(let si=0;si<=steps;si++){
      const p=this.posAt((si/steps)*this.t);
      si===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);
    }
    ctx.strokeStyle=`rgba(255,255,255,${this.alpha*.75})`;
    ctx.lineWidth=0.4+ev*1.;
    ctx.stroke();
    // cell branches
    for(const c of this.cells){
      c.len=Math.min(c.maxLen,c.len+.7+ev*1.8);
      const ex=c.x+c.vx*c.len,ey=c.y+c.vy*c.len;
      const mx=c.x+c.vx*c.len*.5+(Math.random()-.5)*3;
      const my=c.y+c.vy*c.len*.5+(Math.random()-.5)*3;
      const ca=c.a*(1-c.len/c.maxLen)*.7;
      if(ca<.01)continue;
      ctx.beginPath();ctx.moveTo(c.x,c.y);ctx.quadraticCurveTo(mx,my,ex,ey);
      ctx.strokeStyle=`rgba(255,255,255,${ca})`;ctx.lineWidth=.25+ev*.4;ctx.stroke();
      ctx.beginPath();ctx.arc(ex,ey,.5+on*1.2,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${ca*1.2})`;ctx.fill();
    }
    return this.t>=1&&this.alpha>.8;
  }
}

class ChGlyph{
  constructor(){
    const gDef=GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
    this.scale=70+Math.random()*130;
    this.ox=(0.12+Math.random()*.76)*W;
    this.oy=(0.15+Math.random()*.7)*H;
    // Stagger stroke starts
    this.strokes=gDef.map((sPts,si)=>{
      const s=new ChStroke(sPts,this.ox-this.scale*.5,this.oy-this.scale*.5,this.scale);
      s.t=-si*.18; // stagger
      return s;
    });
    this.alpha=1;this.life=0;this.maxLife=180+Math.random()*220;
  }
  draw(ctx,ev,on){
    this.life++;
    if(this.life>this.maxLife)this.alpha=Math.max(0,this.alpha-.012);
    for(const s of this.strokes){if(s.t<0){s.t+=s.speed;}else{s.draw(ctx,ev,on);}}
    return this.alpha<=0;
  }
}

const chGlyphs=[];let chCooldown=0;
function chTrigger(){if(chGlyphs.length>=7)chGlyphs.shift();chGlyphs.push(new ChGlyph());}

function chUpdate(){
  const ev=micOn?sVol:((Math.sin(globalFrame*.009)*.5+.5)*.04);
  const on=micOn?sOnset:0;
  ch.fillStyle=`rgba(0,0,0,${.05+ev*.04})`;ch.fillRect(0,0,chCvs.width,chCvs.height);
  if(globalFrame%5===0){ch.beginPath();ch.arc(Math.random()*chCvs.width,Math.random()*chCvs.height,Math.random()*.7,0,Math.PI*2);ch.fillStyle=`rgba(255,255,255,${Math.random()*.12})`;ch.fill();}
  ch.lineCap='round';ch.lineJoin='round';
  for(let gi=chGlyphs.length-1;gi>=0;gi--){if(chGlyphs[gi].draw(ch,ev,on))chGlyphs.splice(gi,1);}
  chCooldown=Math.max(0,chCooldown-1);
  if(micOn&&vol>0.01&&chCooldown===0){
    if(rawOnset>0.05||(phonemeClass!==0&&phonemeClass!==prevPhoneme)){chTrigger();chCooldown=30;}
  }
  if(!micOn&&globalFrame%100===0)chTrigger();
  document.getElementById('s-pts').textContent='GLYPHS — '+chGlyphs.length;
  document.getElementById('s-shape').textContent='CHARACTER';
}

// Render compose canvas
function compRender(){
  compCtx.fillStyle='#000';compCtx.fillRect(0,0,compCanvas.width,compCanvas.height);
  // Grid
  compCtx.strokeStyle='rgba(255,255,255,.04)';compCtx.lineWidth=1;
  for(let x=0;x<compCanvas.width;x+=60){compCtx.beginPath();compCtx.moveTo(x,0);compCtx.lineTo(x,compCanvas.height);compCtx.stroke();}
  for(let y=0;y<compCanvas.height;y+=60){compCtx.beginPath();compCtx.moveTo(0,y);compCtx.lineTo(compCanvas.width,y);compCtx.stroke();}
  for(const el of compElements){
    compCtx.save();
    compCtx.translate(el.x+el.w/2,el.y+el.h/2);
    compCtx.rotate(el.rot||0);
    compCtx.globalAlpha=el.alpha||1;
    compCtx.globalCompositeOperation=el.blend||'screen';
    compCtx.drawImage(el.img,-el.w/2,-el.h/2,el.w,el.h);
    compCtx.globalCompositeOperation='source-over';
    if(el===compSelected){
      compCtx.globalAlpha=1;
      compCtx.strokeStyle='rgba(255,255,255,.6)';compCtx.lineWidth=1;
      compCtx.strokeRect(-el.w/2-2,-el.h/2-2,el.w+4,el.h+4);
      // Rotation handle
      compCtx.beginPath();compCtx.arc(0,-el.h/2-16,5,0,Math.PI*2);
      compCtx.strokeStyle='rgba(255,255,255,.8)';compCtx.stroke();
    }
    compCtx.restore();
  }
}

compCanvas.addEventListener('mousedown',e=>{
  const r=compCanvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  compSelected=null;
  for(let i=compElements.length-1;i>=0;i--){
    const el=compElements[i];
    const dx=mx-(el.x+el.w/2),dy=my-(el.y+el.h/2);
    const cos=Math.cos(-(el.rot||0)),sin=Math.sin(-(el.rot||0));
    const lx=dx*cos-dy*sin,ly=dx*sin+dy*cos;
    if(Math.abs(lx)<el.w/2&&Math.abs(ly)<el.h/2){compSelected=el;compDrag=el;compDragOff={x:mx-el.x,y:my-el.y};break;}
  }
  compRender();
});

// Strand physics
const NSTR=220,NSEG=32,REST=11;
const GRAV=new THREE.Vector3(0,-0.15,0);
const DAMP=0.978,STIFF=0.5;

class Strand{
  constructor(idx){
    this.idx=idx;this.pinned=new THREE.Vector3();this.nodes=[];this.vels=[];this.rest=[];
    this.phase=Math.random()*Math.PI*2;this.swayFreq=0.3+Math.random()*.8;
    this.opacity=0.12+Math.random()*.25;this.thick=0.3+Math.random()*.5;
    this.pluckDecay=0;this.pluckVel=new THREE.Vector3();
    // Length varies with sound
    this.baseLenMult=0.6+Math.random()*.8;
    this.curLen=REST*(NSEG-1)*this.baseLenMult;
    this.targetLen=this.curLen;
    this.init();
  }
  init(){
    const spread=150;const angle=Math.random()*Math.PI*2,radius=Math.pow(Math.random(),.5)*spread;
    this.pinned.set(radius*Math.cos(angle),100+Math.random()*15,radius*Math.sin(angle));
    this.nodes=[];this.vels=[];this.rest=[];
    for(let i=0;i<NSEG;i++){
      const t=i/(NSEG-1);
      this.nodes.push(new THREE.Vector3(this.pinned.x+(Math.random()-.5)*4,this.pinned.y-t*this.curLen,this.pinned.z+(Math.random()-.5)*4));
      this.vels.push(new THREE.Vector3());
      this.rest.push(i>0?this.curLen/(NSEG-1):0);
    }
  }
  step(dt,ev,pn,on,flux){
    // Target length responds to sound: loud=long, onset/short sound=short
    const lenBase=REST*(NSEG-1)*this.baseLenMult;
    this.targetLen=lenBase*(0.5+ev*2.0+pn*0.5)*(1-on*0.6); // onset shrinks length
    this.targetLen=Math.max(lenBase*.2,Math.min(lenBase*3,this.targetLen));
    this.curLen+=(this.targetLen-this.curLen)*.08; // smooth length transition
    const restL=this.curLen/(NSEG-1);
    for(let i=0;i<NSEG;i++)this.rest[i]=restL;

    // Curvature: straight vs wavy depends on sound character
    const curvature=ev*3+sFlux*8+pn*2; // more flux=more curves
    const swayAmp=1.5+ev*14+pn*8+on*12;
    const swayFreq=this.swayFreq*(1+pn*2.5+on*3);

    for(let i=1;i<NSEG;i++){
      const p=this.nodes[i],v=this.vels[i],prev=this.nodes[i-1];
      const diff=new THREE.Vector3().subVectors(prev,p);
      const dist=diff.length();
      if(dist>0.001){const f=diff.normalize().multiplyScalar((dist-restL)*STIFF);v.add(f.multiplyScalar(dt));}
      v.addScaledVector(GRAV,dt);
      // Sway with voice
      const t2=globalFrame*.012*swayFreq+this.phase;
      const sx=Math.sin(t2)*swayAmp;const sz=Math.cos(t2*.7+this.phase*1.3)*swayAmp*.6;
      v.x+=sx*dt*.1;v.z+=sz*dt*.1;
      // Curvature: lateral undulation along segment index
      if(curvature>0.1){const segT=i/NSEG;v.x+=Math.sin(segT*Math.PI*curvature+globalFrame*.015+this.phase)*curvature*dt*.3;v.z+=Math.cos(segT*Math.PI*curvature*.7+globalFrame*.012+this.phase)*curvature*dt*.2;}
      // Onset turbulence
      if(on>0.08){v.x+=(Math.random()-.5)*on*20*dt;v.z+=(Math.random()-.5)*on*20*dt;v.y+=(Math.random()-.5)*on*8*dt;}
      // Pluck
      if(this.pluckDecay>0){v.addScaledVector(this.pluckVel,dt*this.pluckDecay);this.pluckDecay-=dt*2.5;if(this.pluckDecay<0)this.pluckDecay=0;}
      v.multiplyScalar(DAMP);
      p.addScaledVector(v,dt);
    }
    this.nodes[0].copy(this.pinned);this.vels[0].set(0,0,0);
  }
  pluck(worldPt,force){
    let closest=-1,minD=Infinity;
    for(let i=1;i<NSEG;i++){const d=worldPt.distanceTo(this.nodes[i]);if(d<minD){minD=d;closest=i;}}
    if(minD>30||closest<0)return false;
    const dir=new THREE.Vector3().subVectors(this.nodes[closest],worldPt).normalize();
    for(let i=1;i<NSEG;i++){const fo=Math.max(0,1-Math.abs(i-closest)/(NSEG*.4));this.vels[i].addScaledVector(dir,force*fo*10);}
    this.pluckVel.copy(dir).multiplyScalar(force*2.5);this.pluckDecay=2.0;return true;
  }
  stretch(worldPt,target){
    let closest=-1,minD=Infinity;
    for(let i=1;i<NSEG;i++){const d=worldPt.distanceTo(this.nodes[i]);if(d<minD){minD=d;closest=i;}}
    if(minD>40||closest<0)return;
    // Strong spring pull toward target — elastic rubber band
    const pull=new THREE.Vector3().subVectors(target,this.nodes[closest]);
    const dist=pull.length();
    // Elastic force proportional to stretch distance
    const elasticForce=Math.min(dist*.08,5);
    pull.normalize().multiplyScalar(elasticForce);
    for(let i=1;i<NSEG;i++){const fo=Math.max(0,1-Math.abs(i-closest)/(NSEG*.5));this.vels[i].addScaledVector(pull,fo*1.2);}
  }
}

// Mouse interaction for fall
const fRc=new THREE.Raycaster();const fMouseNDC=new THREE.Vector2(-9,0);
let fMouseDown=false,fShift=false,fActiveStrand=-1,fStretchMode=false;
let fMouseWorld=new THREE.Vector3(),fPrevMouseWorld=new THREE.Vector3();
let fHoverCD=0;

function getFMouseWorld(e){
  fMouseNDC.x=(e.clientX/W)*2-1;fMouseNDC.y=-(e.clientY/H)*2+1;
  const camDir=new THREE.Vector3();fCam.getWorldDirection(camDir);
  const pl=new THREE.Plane(camDir,-camDir.dot(fCam.position)*.4);
  const r=new THREE.Raycaster();r.setFromCamera(fMouseNDC,fCam);
  const hit=new THREE.Vector3();r.ray.intersectPlane(pl,hit);
  return hit||new THREE.Vector3();
}

fLayer.addEventListener('mousedown',e=>{
  fMouseDown=true;fShift=e.shiftKey;fOrbDrag=!fShift;
  fPrevMX=e.clientX;fPrevMY=e.clientY;
  fMouseWorld=getFMouseWorld(e);fPrevMouseWorld.copy(fMouseWorld);
  // Find nearest strand
  fActiveStrand=-1;let minD=Infinity;
  for(let si=0;si<NSTR;si++){
    for(let ni=1;ni<NSEG;ni+=3){
      const wp=fStrands[si].nodes[ni].clone().project(fCam);
      const sx=(wp.x+1)/2*W,sy=(1-wp.y)/2*H;
      const d=(sx-e.clientX)**2+(sy-e.clientY)**2;
      if(d<minD){minD=d;if(d<900)fActiveStrand=si;} // 30px radius
    }
  }
  fStretchMode=fShift&&fActiveStrand>=0;
  if(fActiveStrand>=0&&!fStretchMode){
    fStrands[fActiveStrand].pluck(fMouseWorld,4+sOnset*5);
    fOrbDrag=false;
  }
});

fLayer.addEventListener('mousemove',e=>{
  if(currentTab!=='fall')return;
  tipEl.style.left=(e.clientX+16)+'px';tipEl.style.top=(e.clientY-8)+'px';
  const mw=getFMouseWorld(e);
  if(fMouseDown){
    if(fOrbDrag&&!fStretchMode){fSph.theta-=(e.clientX-fPrevMX)*.006;fSph.phi+=(e.clientY-fPrevMY)*.006;fApplyCam();}
    if(fStretchMode&&fActiveStrand>=0)fStrands[fActiveStrand].stretch(fMouseWorld,mw);
    if(fActiveStrand>=0&&!fStretchMode&&!fOrbDrag){
      // Drag pluck: affect nearby strands too
      for(let si=0;si<NSTR;si++){
        const d=Math.abs(si-fActiveStrand);
        if(d<12){const f=Math.max(0,1-d/12)*2;fStrands[si].pluck(mw,f);}
      }
    }
  }else{
    // Hover attraction — more elastic, stronger pull
    for(let si=0;si<NSTR;si++){
      const mid=fStrands[si].nodes[Math.floor(NSEG*.4)];
      const dx=mid.x-mw.x,dz=mid.z-mw.z;
      const d2=dx*dx+dz*dz;
      if(d2<120*120){
        const f=(1-Math.sqrt(d2)/120)*.08;
        for(let ni=1;ni<NSEG;ni++){const nf=f*(1-ni/NSEG*.5);fStrands[si].vels[ni].x+=(mw.x-fStrands[si].nodes[ni].x)*nf;fStrands[si].vels[ni].z+=(mw.z-fStrands[si].nodes[ni].z)*nf;}
      }
    }
    fHoverCD--;
    if(fHoverCD<0){let near=false;for(let si=0;si<NSTR;si++){if(fStrands[si].pinned.distanceTo(mw)<70){near=true;break;}}if(near){tipEl.textContent=WORDS[Math.floor(Math.random()*WORDS.length)];tipEl.style.display='block';fHoverCD=25;}else tipEl.style.display='none';}
  }
  fPrevMX=e.clientX;fPrevMY=e.clientY;fPrevMouseWorld.copy(mw);fMouseWorld.copy(mw);
});

let ftx=0,fty=0;
fLayer.addEventListener('touchstart',e=>{ftx=e.touches[0].clientX;fty=e.touches[0].clientY;});
fLayer.addEventListener('touchmove',e=>{fSph.theta-=(e.touches[0].clientX-ftx)*.007;fSph.phi+=(e.touches[0].clientY-fty)*.007;ftx=e.touches[0].clientX;fty=e.touches[0].clientY;fApplyCam();});

function fUpdateGeo(){
  for(let s=0;s<NSTR;s++)for(let i=0;i<NSEG;i++){const v=fStrands[s].nodes[i];sVerts[(s*NSEG+i)*3]=v.x;sVerts[(s*NSEG+i)*3+1]=v.y;sVerts[(s*NSEG+i)*3+2]=v.z;}
  sGeo.attributes.position.needsUpdate=true;
  for(let g=0;g<GLINTS;g++){const si=Math.floor(Math.random()*NSTR),ni=Math.floor(Math.random()*(NSEG-1)+1);const v=fStrands[si].nodes[ni];glPos[g*3]=v.x;glPos[g*3+1]=v.y;glPos[g*3+2]=v.z;}
  glGeo.attributes.position.needsUpdate=true;
  for(let w=0;w<WEB.length;w++){
    const [a,b]=WEB[w];const A=fStrands[a].pinned,B=fStrands[b].pinned;
    for(let k=0;k<=11;k++){const t=k/11;const sag=(sVol*25+10)*Math.sin(t*Math.PI);wVerts[(w*12+k)*3]=A.x+(B.x-A.x)*t;wVerts[(w*12+k)*3+1]=Math.min(A.y,B.y)-sag;wVerts[(w*12+k)*3+2]=A.z+(B.z-A.z)*t;}
  }
  wGeo.attributes.position.needsUpdate=true;wGeo.setDrawRange(0,WEB.length*24);
}

function fUpdate(){
  const ev=micOn?sVol:((Math.sin(globalFrame*.008)*.5+.5)*.04);
  const pn=micOn?Math.min(sPitch/800,1):0,on=micOn?sOnset:0,fl=micOn?sFlux:0;
  const dt=1/60;
  for(let s=0;s<NSTR;s++)fStrands[s].step(dt,ev,pn,on,fl);
  fUpdateGeo();
  sMat.uniforms.uVol.value=ev;sMat.uniforms.uOnset.value=on;
  pinMat.uniforms.uVol.value=ev+on*.5;
  glMat.uniforms.uVol.value=ev;glMat.uniforms.uOnset.value=on;
  wMat.opacity=Math.min(.15,.04+ev*.1+on*.06);
  if(!fOrbDrag&&!fMouseDown){fSph.theta+=.0004+ev*.0025+on*.003;fApplyCam();}
  document.getElementById('s-pts').textContent='STRANDS — '+NSTR;
  document.getElementById('s-shape').textContent='SHAPE — fall';
  fRen.render(fScene,fCam);
}

// ════════════════════════════════════════════════════════
// MAIN LOOP
// ════════════════════════════════════════════════════════
function loop(){requestAnimationFrame(loop);globalFrame++;analyzeAudio();if(currentTab==='particle')pUpdate();else if(currentTab==='trajectory')tUpdate();else if(currentTab==='fall')fUpdate();else if(currentTab==='wave')wUpdate();else if(currentTab==='character')chUpdate();}
loop();

// ════════════════════════════════════════════════════════
// TAB SWITCHING
// ════════════════════════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    currentTab=tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t===tab));
    ['particle','trajectory','fall','wave','character'].forEach(id=>{
      const el=document.getElementById('layer-'+id);
      if(el)el.classList.toggle('hidden-layer',currentTab!==id);
    });
    document.getElementById('s-mode').textContent='MODE — '+currentTab;
    const noBtn=currentTab==='fall'||currentTab==='wave'||currentTab==='character';
    document.getElementById('btn-explode').style.display=currentTab==='particle'?'':'none';
    document.getElementById('btn-freeze').style.display=noBtn?'none':'';
    document.getElementById('btn-lines').style.display=noBtn?'none':'';
    document.getElementById('btn-pts').style.display=noBtn?'none':'';
    tipEl.style.display='none';
    if(noBtn)document.getElementById('shape-label').textContent='';
    else if(currentTab==='particle')document.getElementById('shape-label').textContent=pCurShape.toUpperCase();
    else document.getElementById('shape-label').textContent=tCurShape.toUpperCase();
  });
});

// ════════════════════════════════════════════════════════
// BUTTONS
// ════════════════════════════════════════════════════════
document.getElementById('btn-mic').addEventListener('click',()=>micOn?stopMic():startMic());
document.getElementById('btn-lines').addEventListener('click',function(){const on=this.classList.toggle('on');pShowLines=on;tShowLines=on;if(!pShowLines)plGeo.setDrawRange(0,0);if(!tShowLines)tPool.forEach(p=>p.line.visible=false);});
document.getElementById('btn-pts').addEventListener('click',function(){const on=this.classList.toggle('on');pShowDots=on;tShowDots=on;});
document.getElementById('btn-freeze').addEventListener('click',function(){tFrozen=!tFrozen;this.classList.toggle('on',tFrozen);this.textContent=tFrozen?'UNFREEZE':'FREEZE';if(!tFrozen)tNeedRedraw=true;});
document.getElementById('btn-explode').addEventListener('click',pExplode);
document.getElementById('btn-reset').addEventListener('click',()=>{
  if(currentTab==='particle'){pGens.sphere();for(let i=0;i<PMAX*3;i++)pPos[i]=pOri[i];pOrb.sph.theta=.4;pOrb.sph.phi=1.25;pOrb.sph.r=300;pOrb.apply();}
  else if(currentTab==='trajectory'){tOrb.resetD();tOrb.sph.theta=.4;tOrb.sph.phi=1.25;tOrb.sph.r=420;tOrb.apply();tBake();}
  else if(currentTab==='fall'){for(let i=0;i<NSTR;i++)fStrands[i].init();fSph={theta:0,phi:Math.PI/2,r:320};fApplyCam();}
  else if(currentTab==='character'){chGlyphs.length=0;ch.fillStyle='#000';ch.fillRect(0,0,W,H);}
  else if(currentTab==='wave'){wSCurl=0;wPhase=0;wMode=0;for(let i=0;i<FFT_HIST;i++)wFFTHistory[i].fill(0);}
});
document.getElementById('btn-save').addEventListener('click',()=>{
  let dataURL;
  if(currentTab==='particle'){pRen.render(pScene,pCam);dataURL=pRen.domElement.toDataURL('image/png');}
  else if(currentTab==='trajectory'){tRen.render(tScene,tCam);dataURL=tRen.domElement.toDataURL('image/png');}
  else if(currentTab==='wave'){wRen.render(wScene,wCam);dataURL=wRen.domElement.toDataURL('image/png');}
  else if(currentTab==='character'){dataURL=chCvs.toDataURL('image/png');}
  else{fRen.render(fScene,fCam);dataURL=fRen.domElement.toDataURL('image/png');}
  const a=document.createElement('a');a.download='voice-art-'+currentTab+'-'+Date.now()+'.png';a.href=dataURL;a.click();
});
document.getElementById('btn-explode').style.display='';
document.getElementById('btn-freeze').style.display='';
window.addEventListener('resize',()=>{const nW=innerWidth,nH=innerHeight;[pCam,tCam,fCam,wCam].forEach(c=>{c.aspect=nW/nH;c.updateProjectionMatrix();});pRen.setSize(nW,nH);tRen.setSize(nW,nH);fRen.setSize(nW,nH);wRen.setSize(nW,nH);chCvs.width=nW;chCvs.height=nH;});
</script>
