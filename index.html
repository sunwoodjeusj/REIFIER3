<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #080808;
  color: #fff;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
  cursor: none;
}
#cursor {
  position: fixed;
  width: 6px; height: 6px;
  background: rgba(255,255,255,0.8);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
}
#cursor-ring {
  position: fixed;
  width: 32px; height: 32px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: width 0.3s, height 0.3s, border-color 0.3s;
}
#scene {
  position: fixed;
  inset: 0;
  perspective: 1400px;
}
#ring-wrapper {
  position: absolute;
  top: 50%; left: 50%;
  transform-style: preserve-3d;
}
.card {
  position: absolute;
  width: 210px;
  height: 135px;
  border-radius: 4px;
  overflow: hidden;
  cursor: none;
  transform-style: preserve-3d;
  opacity: 0.42;
  transition: opacity 0.5s ease;
  border: 0.5px solid rgba(255,255,255,0.08);
}
.card.active {
  opacity: 1;
  border-color: rgba(255,255,255,0.4);
}
.card[data-link].active {
  border-color: rgba(255,255,255,0.85);
  box-shadow: 0 0 22px rgba(255,255,255,0.18);
}
.card img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
#logo-wrap {
  position: fixed;
  top: 28px;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 100;
}
#logo-wrap img {
  height: 40px;
  width: auto;
  opacity: 0.85;
  mix-blend-mode: screen;
}
#active-label {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 58px;
  font-weight: 200;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.0);
  pointer-events: none;
  z-index: 10;
  text-align: center;
  white-space: nowrap;
  text-transform: uppercase;
  transition: color 0.35s ease, opacity 0.35s ease;
}
#active-label.visible {
  color: rgba(255,255,255,0.88);
}
#active-sub {
  position: fixed;
  top: calc(50% + 46px);
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0);
  pointer-events: none;
  z-index: 10;
  text-transform: uppercase;
  transition: color 0.35s ease;
}
#active-sub.visible { color: rgba(255,255,255,0.3); }
#index-num {
  position: fixed;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  letter-spacing: 0.25em;
  color: rgba(255,255,255,0.18);
  pointer-events: none;
  z-index: 100;
  text-transform: uppercase;
}
#footer-left {
  position: fixed;
  bottom: 32px; left: 36px;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
  line-height: 2;
  pointer-events: none;
  z-index: 100;
}
#footer-right {
  position: fixed;
  bottom: 32px; right: 36px;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
  line-height: 2;
  text-align: right;
  pointer-events: none;
  z-index: 100;
}
#drag-hint {
  position: fixed;
  top: 50%;
  right: 36px;
  transform: translateY(-50%);
  font-size: 8px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.12);
  text-transform: uppercase;
  pointer-events: none;
  z-index: 100;
  writing-mode: vertical-rl;
}
</style>
</head>

];


const sections = [
  { name: 'Brand',      sub: 'Identity & Visual Language' },
  { name: 'Poster',     sub: 'Graphic Communication' },
  { name: 'Art Book',   sub: 'Editorial Design' },
  { name: 'Video',      sub: 'Motion & Time' },
  { name: 'Voice Art',  sub: 'Sound to Form' },
  { name: 'Lenticular', sub: 'Parallax & Illusion' },
  { name: 'Spinor',     sub: 'Rotation & Phase' },
];

const RADIUS = 340;
const COUNT = sections.length;
const wrapper = document.getElementById('ring-wrapper');
const activeLabel = document.getElementById('active-label');
const activeSub = document.getElementById('active-sub');
const indexNum = document.getElementById('index-num');
const cursorEl = document.getElementById('cursor');
const cursorRing = document.getElementById('cursor-ring');

let targetRotY = 0;
let currentRotY = 0;
let currentRotX = 18;
let targetRotX = 18;
let activeIndex = -1;
let isDragging = false;
let lastMouseX = 0, lastMouseY = 0;
let downX = 0, downY = 0;
let autoRotate = true;
let autoTimer = null;
let cx = window.innerWidth/2, cy = window.innerHeight/2;

const cards = [];

sections.forEach((sec, i) => {
  const angle = (i / COUNT) * Math.PI * 2;
  const x = Math.sin(angle) * RADIUS;
  const z = Math.cos(angle) * RADIUS;
  const rotY = -angle * 180 / Math.PI;

  const card = document.createElement('div');
  card.className = 'card';
  card.style.transform = `translate(-105px, -67px) translateX(${x}px) translateZ(${z}px) rotateY(${rotY}deg)`;

  const img = document.createElement('img');
  img.src = imgData[i];
  img.draggable = false;
  card.appendChild(img);

  card.addEventListener('mouseenter', () => {
    if (isDragging) return;
    activeIndex = i;
    autoRotate = false;
    activeLabel.textContent = sec.name.toUpperCase();
    activeLabel.classList.add('visible');
    activeSub.textContent = sec.sub;
    activeSub.classList.add('visible');
    indexNum.textContent = String(i+1).padStart(2,'0') + ' / 07';
    updateCards();
  });

  card.addEventListener('mouseleave', () => {});

  // Brand section opens the logo / brand identity page on click
  if (sec.name === 'Brand') {
    card.dataset.link = 'logo.html';
    card.addEventListener('click', () => {
      const moved = Math.hypot(cx - downX, cy - downY);
      if (moved < 6) {
        window.open('logo.html', '_blank');
      }
    });
  }

  // Poster section (index 1) opens the poster gallery in a new window on click
  if (sec.name === 'Poster') {
    card.dataset.link = 'poster.html';
    card.addEventListener('click', () => {
      const moved = Math.hypot(cx - downX, cy - downY);
      if (moved < 6) {
        window.open('poster.html', '_blank');
      }
    });
  }

  // Voice Art section opens the voice art page in a new window on click
  if (sec.name === 'Voice Art') {
    card.dataset.link = 'voice-art_final.html';
    card.addEventListener('click', () => {
      const moved = Math.hypot(cx - downX, cy - downY);
      if (moved < 6) {
        window.open('voice-art_final.html', '_blank');
      }
    });
  }

  wrapper.appendChild(card);
  cards.push({ el: card });
});

function updateCards() {
  cards.forEach((c, i) => {
    if (i === activeIndex) c.el.classList.add('active');
    else c.el.classList.remove('active');
  });
}

function resetActive() {
  activeIndex = -1;
  activeLabel.textContent = '—';
  activeLabel.classList.remove('visible');
  activeSub.textContent = '';
  activeSub.classList.remove('visible');
  indexNum.textContent = '— / 07';
  updateCards();
}

document.addEventListener('mousemove', (e) => {
  cx = e.clientX; cy = e.clientY;
  cursorEl.style.left = cx + 'px';
  cursorEl.style.top = cy + 'px';
  cursorRing.style.left = cx + 'px';
  cursorRing.style.top = cy + 'px';

  if (isDragging) {
    const dx = cx - lastMouseX;
    const dy = cy - lastMouseY;
    targetRotY += dx * 0.45;
    targetRotX -= dy * 0.2;
    targetRotX = Math.max(-35, Math.min(55, targetRotX));
    lastMouseX = cx; lastMouseY = cy;
  }
});

document.addEventListener('mousedown', (e) => {
  isDragging = true;
  autoRotate = false;
  lastMouseX = e.clientX; lastMouseY = e.clientY;
  downX = e.clientX; downY = e.clientY;
  resetActive();
  cursorRing.style.width = '20px';
  cursorRing.style.height = '20px';
});

document.addEventListener('mouseup', () => {
  isDragging = false;
  cursorRing.style.width = '32px';
  cursorRing.style.height = '32px';
  if (autoTimer) clearTimeout(autoTimer);
  autoTimer = setTimeout(() => { autoRotate = true; }, 2500);
});

document.addEventListener('mouseleave', () => {
  if (!isDragging) {
    resetActive();
    autoRotate = true;
  }
});

function animate() {
  if (autoRotate) targetRotY += 0.10;
  currentRotY += (targetRotY - currentRotY) * 0.055;
  currentRotX += (targetRotX - currentRotX) * 0.055;
  wrapper.style.transform = `translate(-50%, -50%) rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
  requestAnimationFrame(animate);
}
animate();
</script>
